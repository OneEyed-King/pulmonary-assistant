services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: hapi-fhir
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://hapi-fhir-postgres:5432/hapi"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "admin"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
      HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      HAPI_FHIR_CORS_ALLOWED_ORIGIN: "*"
    depends_on:
      hapi-fhir-postgres:
        condition: service_healthy

  fhir-init:
    image: curlimages/curl:latest
    container_name: fhir-init
    depends_on:
      - hapi-fhir
    environment:
      FHIR_SERVER: "http://hapi-fhir:8080/fhir"
    volumes:
      - ./fixtures:/fixtures:ro
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-fhir-data.sh"]
    restart: "no"

  hapi-fhir-postgres:
    image: postgres:16-alpine
    container_name: hapi-fhir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "hapi"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hapi"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    volumes:
      - hapi-fhir-postgres-data:/var/lib/postgresql/data

volumes:
  hapi-fhir-postgres-data: